<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>%%TITLE%%</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
<style>
/* ── Design tokens from tgg-design-tokens.yaml ─────────────────────────── */
:root {
  --color-bg-dark:          #212931;
  --color-bg-surface:       #303944;
  --color-bg-card:          #3b4656;
  --color-accent-primary:   #205ea7;
  --color-accent-dark-blue: #024b80;
  --color-accent-secondary: #09909c;
  --color-accent-dark-petrol: #036b75;
  --color-accent-warm:      #f08226;
  --color-accent-dark-warm: #d57112;
  --color-text-primary:     #ffffff;
  --color-text-secondary:   rgba(255,255,255,0.78);
  --color-text-muted:       rgba(255,255,255,0.45);
  --font-primary: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  --gradient-brand: linear-gradient(to right, #205ea7 0%, #09909c 33%, #c8c87a 66%, #f08226 100%);

}

/* ── Reveal.js base theme (no theme CSS loaded — apply manually) ─────────── */
.reveal-viewport {
  background: var(--color-bg-dark);
}
.reveal {
  font-family: var(--font-primary);
  font-size: 16px;
  color: var(--color-text-secondary);
}
.reveal h1, .reveal h2, .reveal h3, .reveal h4, .reveal h5, .reveal h6 {
  font-family: var(--font-primary);
  color: var(--color-text-primary);
  font-weight: 700;
  text-transform: none;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin: 0;
  text-shadow: none;
}

/* ── Fixed chrome ────────────────────────────────────────────────────────── */
#logo {
  position: fixed;
  top: 20px;
  right: 36px;
  z-index: 200;
  width: 172px;
  height: 42px;
  background: rgba(255,255,255,0.92);
  border-radius: 6px;
  padding: 5px 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
#logo { display: block; text-decoration: none; }
#logo svg { width: 100%; height: 100%; display: block; }

/* ── Reveal.js UI overrides ──────────────────────────────────────────────── */
.reveal > .progress { height: 3px; background: transparent; }
.reveal > .progress span { background: var(--gradient-brand); transition: width 0.4s ease; }

.reveal .controls { color: var(--color-accent-primary); bottom: 20px; right: 20px; }
.reveal .controls .controls-arrow { opacity: 0.6; }
.reveal .controls .controls-arrow:hover { opacity: 1; }

.reveal .slide-number {
  background: rgba(33,41,49,0.85);
  color: var(--color-text-muted);
  font-family: var(--font-primary);
  font-size: 0.6875rem;
  font-weight: 500;
  border-radius: 4px;
  padding: 4px 9px;
  bottom: 28px;
  right: 230px; /* clear of the controls */
  letter-spacing: 0.05em;
}

/* ── Slide layout ────────────────────────────────────────────────────────── */
.reveal .slides > section {
  text-align: left;
  padding: 52px 72px 80px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* ── Shared slide components ─────────────────────────────────────────────── */
.reveal .section-label {
  font-size: 0.6875rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--color-accent-warm);
  margin-bottom: 10px;
}
.reveal .slide-title {
  font-size: 2.25rem; font-weight: 700;
  line-height: 1.15; letter-spacing: -0.02em;
  margin-bottom: 28px; color: var(--color-text-primary);
}
.reveal .slide-title .accent { color: var(--color-accent-secondary); }
.reveal .divider {
  width: 44px; height: 3px;
  background: var(--gradient-brand);
  border-radius: 2px;
  margin: 14px 0 24px;
}

.reveal p, .reveal li { font-size: 1rem; line-height: 1.65; color: var(--color-text-secondary); }
.reveal strong { color: var(--color-text-primary); font-weight: 600; }
.reveal em { color: var(--color-text-muted); font-style: italic; }

.reveal ul { list-style: none; padding: 0; margin: 0; }
.reveal ul li { padding: 5px 0 5px 22px; position: relative; margin: 0; }
.reveal ul li::before { content: '→'; position: absolute; left: 0; color: var(--color-accent-secondary); font-weight: 700; }

.reveal pre {
  background: #0d1117;
  border: 1px solid rgba(32,94,167,0.35);
  border-left: 3px solid var(--color-accent-primary);
  border-radius: 6px;
  padding: 14px 18px;
  font-family: 'Courier New', Consolas, monospace;
  font-size: 0.8125rem; line-height: 1.65;
  color: #e6edf3;
  overflow-x: auto;
  margin: 12px 0;
  width: auto;
  box-shadow: none;
}
.reveal pre.shell { border-left-color: var(--color-accent-warm); }
.reveal pre.json  { border-left-color: var(--color-accent-secondary); }
.reveal code {
  font-family: 'Courier New', Consolas, monospace;
  font-size: 0.875em;
  background: rgba(32,94,167,0.15);
  color: #79c0ff;
  padding: 1px 6px;
  border-radius: 3px;
}
.reveal pre code {
  background: none; padding: 0; color: inherit;
  font-size: inherit; border-radius: 0;
  max-height: none;
}

.reveal table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 0.9375rem; }
.reveal thead tr { background: var(--color-bg-surface); }
.reveal th { padding: 11px 14px; text-align: left; font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-accent-secondary); border-bottom: 2px solid rgba(32,94,167,0.5); }
.reveal td { padding: 10px 14px; color: var(--color-text-secondary); border-bottom: 1px solid rgba(255,255,255,0.06); }
.reveal tr:hover td { background: rgba(255,255,255,0.025); }
.reveal td:first-child { font-weight: 600; color: var(--color-text-primary); }

.reveal .card {
  background: var(--color-bg-surface);
  border-radius: 8px;
  padding: 18px 22px;
  margin: 10px 0;
  border-left: 3px solid var(--color-accent-primary);
}
.reveal .card.orange { border-left-color: var(--color-accent-warm); }
.reveal .card.petrol { border-left-color: var(--color-accent-secondary); }
.reveal .card.red    { border-left-color: #e05555; }
.reveal .card-title { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; color: var(--color-accent-primary); }
.reveal .card.orange .card-title { color: var(--color-accent-warm); }
.reveal .card.petrol .card-title { color: var(--color-accent-secondary); }
.reveal .card.red    .card-title { color: #e05555; }

.reveal .badge {
  display: inline-block; padding: 2px 9px;
  border-radius: 4px; font-size: 0.6875rem; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.reveal .badge-green  { background: rgba(9,144,156,0.18);  color: #3dc5ce; border: 1px solid rgba(9,144,156,0.4); }
.reveal .badge-yellow { background: rgba(240,130,38,0.15); color: #f4a24a; border: 1px solid rgba(240,130,38,0.4); }
.reveal .badge-red    { background: rgba(220,60,60,0.15);  color: #f07575; border: 1px solid rgba(220,60,60,0.35); }
.reveal .badge-blue   { background: rgba(32,94,167,0.18);  color: #6aadee; border: 1px solid rgba(32,94,167,0.4); }

.two-col   { display: grid; grid-template-columns: 1fr 1fr;     gap: 22px; margin-top: 8px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-top: 8px; }

/* ── Title slide ─────────────────────────────────────────────────────────── */
.reveal .slides > section.slide--title { justify-content: center; }
.reveal .slide--title .display-title {
  font-size: 3.125rem; font-weight: 800;
  line-height: 1.1; letter-spacing: -0.025em;
  max-width: 780px; margin-bottom: 18px;
  color: var(--color-text-primary);
}
.reveal .slide--title .display-title .accent { color: var(--color-accent-secondary); }
.reveal .slide--title .display-quote {
  font-size: 0.9375rem; font-style: italic;
  color: var(--color-text-muted);
  border-left: 3px solid var(--color-accent-warm);
  padding-left: 18px; line-height: 1.65; max-width: 660px;
}
.reveal .slide--title .eyebrow {
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--color-text-muted); margin-bottom: 24px;
}

/* ── Agenda ──────────────────────────────────────────────────────────────── */
.agenda-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.agenda-item {
  display: flex; align-items: center; gap: 18px;
  padding: 12px 18px;
  background: var(--color-bg-surface); border-radius: 7px;
  border-left: 3px solid transparent;
}
.agenda-item:nth-child(1) { border-left-color: #205ea7; }
.agenda-item:nth-child(2) { border-left-color: #197aa8; }
.agenda-item:nth-child(3) { border-left-color: #09909c; }
.agenda-item:nth-child(4) { border-left-color: #3fa380; }
.agenda-item:nth-child(5) { border-left-color: #f08226; }
.agenda-item:nth-child(6) { border-left-color: #d57112; }
.agenda-num   { font-size: 1.375rem; font-weight: 800; color: rgba(255,255,255,0.12); min-width: 36px; }
.agenda-emoji { font-size: 1.125rem; min-width: 28px; }
.agenda-text  { font-size: 0.9375rem; font-weight: 500; color: var(--color-text-secondary); }

/* ── Use-case cards ──────────────────────────────────────────────────────── */
.usecase-card { background: var(--color-bg-surface); border-radius: 8px; padding: 16px 18px; height: 100%; }
.usecase-card .uc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.usecase-card .uc-title { font-size: 0.8125rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
.usecase-card ul li { font-size: 0.875rem; padding: 3px 0 3px 18px; }

/* ── Demo steps ──────────────────────────────────────────────────────────── */
.demo-step {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 12px 16px;
  background: var(--color-bg-surface); border-radius: 7px; margin-bottom: 8px;
}
.demo-step-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--color-accent-primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
}
.demo-step-text { font-size: 0.9375rem; color: var(--color-text-secondary); padding-top: 2px; }

/* ── Takeaways ───────────────────────────────────────────────────────────── */
.takeaway-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 18px; background: var(--color-bg-surface);
  border-radius: 8px; margin-bottom: 10px;
}
.takeaway-icon {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(32,94,167,0.2); border: 1px solid rgba(32,94,167,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8125rem; flex-shrink: 0; margin-top: 1px;
}
.takeaway-text { font-size: 0.9375rem; line-height: 1.55; color: var(--color-text-secondary); }

/* ── Resources ───────────────────────────────────────────────────────────── */
.resource-item {
  display: flex; align-items: center; gap: 18px;
  padding: 18px 22px; background: var(--color-bg-surface);
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 12px;
}
.resource-icon {
  width: 42px; height: 42px; border-radius: 8px;
  background: rgba(32,94,167,0.2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 1.25rem;
}
.resource-title { font-size: 0.9375rem; font-weight: 600; color: white; margin-bottom: 3px; }
.resource-url   { font-size: 0.8rem; color: var(--color-accent-secondary); font-family: 'Courier New', monospace; }
</style>
</head>
