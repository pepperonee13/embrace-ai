##
## TGG Presentation Design Tokens
## Single source of truth for all colors, typography, and gradients
## used across layout.html, styleguide.html, and generated presentations.
##
## Brand source: TIMETOACT GROUP Brand Guide (brandbook.pdf)
##

# ─── Brand Reference Palette (from Brand Guide) ─────────────
# Canonical color definitions with print (CMYK) and screen (RGB/Hex) values.
# All tokens below derive from these.

brand-palette:
  primary:
    blue:         { hex: "#205ea7", rgb: [32, 94, 167],   cmyk: [90, 62, 2, 0]   }
    dark-blue:    { hex: "#024b80", rgb: [2, 75, 128],    cmyk: [99, 71, 23, 8]  }
    petrol:       { hex: "#09909c", rgb: [9, 144, 156],   cmyk: [80, 22, 36, 5]  }
    dark-petrol:  { hex: "#036b75", rgb: [3, 107, 117],   cmyk: [86, 35, 43, 24] }
    orange:       { hex: "#f08226", rgb: [240, 130, 38],  cmyk: [0, 58, 90, 0]   }
    dark-orange:  { hex: "#d57112", rgb: [213, 113, 18],  cmyk: [13, 63, 100, 3] }
    gunmetal:     { hex: "#303944", rgb: [48, 57, 68],    cmyk: [80, 64, 49, 52] }
    dark-gunmetal:{ hex: "#212931", rgb: [33, 41, 49],    cmyk: [80, 64, 49, 70] }
  # Secondary scales (visually sampled from Brand Guide p.4 swatches —
  # the printed hex labels are incorrect; these are inferred from the rendered colors)
  secondary:
    blue:
      "2": { hex: "#3b7bbf" }   # lighter mid-blue
      "3": { hex: "#5a9bd5" }   # soft sky blue
      "4": { hex: "#7fbce0" }   # pale steel blue
      "5": { hex: "#a8d8ea" }   # very light ice blue
    petrol:
      "2": { hex: "#2da8a8" }   # brighter teal
      "3": { hex: "#5cbfb8" }   # medium seafoam
      "4": { hex: "#8fd4c8" }   # light mint
      "5": { hex: "#b8e6d8" }   # pale aqua
    pistachio:
      base: { hex: "#b8c44a" }  # warm olive-pistachio
      "2":  { hex: "#c8cf6e" }  # softer yellow-green
      "3":  { hex: "#d5d88a" }  # muted lime
      "4":  { hex: "#e0e0a4" }  # pale chartreuse
      "5":  { hex: "#eae8be" }  # very light cream-yellow
    orange:
      "2": { hex: "#e6a05c" }   # warm golden-peach
      "3": { hex: "#d8a07a" }   # soft salmon
      "4": { hex: "#cc9488" }   # dusty rose
      "5": { hex: "#c08e90" }   # muted mauve-salmon

  gradient-stops:
    # Linear gradient anchor points (Brand Guide, p.2)
    - { name: blue,      hex: "#205ea7" }
    - { name: petrol,    hex: "#09909c" }
    - { name: pistachio, hex: "#c8c87a" }   # interpolated from radial gradient visual
    - { name: orange,    hex: "#f08226" }

# ─── Applied Color Tokens ────────────────────────────────────

color:
  bg:
    dark:    "#212931"   # main slide background  (= dark-gunmetal)
    surface: "#303944"   # cards, agenda items, table headers  (= gunmetal)
    card:    "#3b4656"   # elevated card background

  accent:
    primary:      "#205ea7"   # blue  — default borders, links, code highlight
    dark-blue:    "#024b80"   # deep blue
    secondary:    "#09909c"   # teal/petrol — arrow bullets, .accent text, petrol cards
    dark-petrol:  "#036b75"   # deep petrol
    warm:         "#f08226"   # orange — section-label, .card.orange, shell pre border
    dark-warm:    "#d57112"   # deep orange

  text:
    primary:   "#ffffff"              # headings, strong, td:first-child
    secondary: "rgba(255,255,255,0.78)"  # body text, list items
    muted:     "rgba(255,255,255,0.45)"  # em, slide-number, eyebrow, display-quote

# ─── Gradients ───────────────────────────────────────────────

gradient:
  brand: "linear-gradient(to right, #205ea7 0%, #09909c 33%, #c8c87a 66%, #f08226 100%)"
  # Used for: .divider bar, Reveal.js progress bar

# ─── Typography ──────────────────────────────────────────────

typography:
  font-primary: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  font-mono:    "'Courier New', Consolas, monospace"

  scale:
    display-title: "3.125rem / weight 800"   # hero title slide
    slide-title:   "2.25rem  / weight 700"   # section headings
    body:          "1rem     / weight 400"   # paragraph, list items
    small:         "0.9375rem"               # table cells, agenda-text
    label:         "0.75rem  / weight 600 / uppercase / ls 0.06em"  # card-title
    overline:      "0.6875rem / weight 600 / uppercase / ls 0.1em"  # section-label, th

# ─── Badges ──────────────────────────────────────────────────

badge:
  green:  { bg: "rgba(9,144,156,0.18)",  text: "#3dc5ce", border: "rgba(9,144,156,0.4)"  }
  yellow: { bg: "rgba(240,130,38,0.15)", text: "#f4a24a", border: "rgba(240,130,38,0.4)" }
  red:    { bg: "rgba(220,60,60,0.15)",  text: "#f07575", border: "rgba(220,60,60,0.35)" }
  blue:   { bg: "rgba(32,94,167,0.18)",  text: "#6aadee", border: "rgba(32,94,167,0.4)"  }

# ─── Agenda Border Colors ────────────────────────────────────

agenda-border-colors:
  - "#205ea7"   # item 1 — blue
  - "#197aa8"   # item 2
  - "#09909c"   # item 3 — petrol
  - "#3fa380"   # item 4
  - "#f08226"   # item 5 — orange
  - "#d57112"   # item 6 — dark-orange
  - "#a05d10"   # item 7

# ─── Code Blocks ─────────────────────────────────────────────

code-block:
  background:      "#0d1117"
  text:            "#e6edf3"
  border-default:  "#205ea7"   # generic code
  border-shell:    "#f08226"   # shell commands  (pre.shell)
  border-json:     "#09909c"   # JSON / config   (pre.json)
  inline-bg:       "rgba(32,94,167,0.15)"
  inline-text:     "#79c0ff"

# ─── Logo ────────────────────────────────────────────────────

logo:
  file: "logo.svg"
  link: "https://www.timetoact-group.at/"
  display-width:  "172px"
  display-height: "42px"
  bg:             "rgba(255,255,255,0.92)"
  border-radius:  "6px"
  viewBox:        "74 740 1780 440"
