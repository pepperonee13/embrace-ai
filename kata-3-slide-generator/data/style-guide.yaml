gradients:
  linear:
    description: "Linear gradient progression from Blue through Petrol and Pistachio to Orange"
    stops:
      - color: "Blue"
        position: "0%"
      - color: "Petrol"
        position: "33%"
      - color: "Pistachio"
        position: "66%"
      - color: "Orange"
        position: "100%"
  
  radial:
    description: "Radial gradient with four-color blend"
    center_blend: true
    colors:
      - "Blue"
      - "Petrol"
      - "Pistachio"
      - "Orange"

color_usage:
  primary_colors:
    purpose: "Main brand colors for primary elements and key messaging"
    applications:
      - "Logo and brand marks"
      - "Headlines and key text"
      - "Primary UI elements"
      - "Call-to-action buttons"
  
  secondary_colors:
    purpose: "Supporting colors for depth and variety"
    applications:
      - "Backgrounds and overlays"
      - "Secondary UI elements"
      - "Data visualization"
      - "Accent elements"
  
  gradients:
    purpose: "Dynamic color transitions for modern, energetic feel"
    applications:
      - "Hero sections"
      - "Background elements"
      - "Transitional elements"
      - "Special emphasis areas"

accessibility:
  contrast_recommendations:
    - text_on_dark: "Use light colors (Pistachio variants) for text on dark backgrounds"
    - text_on_light: "Use dark colors (Dark Gunmetal, Dark Petrol, Dark Blue) for text on light backgrounds"
    - minimum_contrast: "Maintain WCAG AA standard (4.5:1 for normal text, 3:1 for large text)"

file_formats:
  supported:
    - "RGB (Screen/Digital)"
    - "CMYK (Print)"
    - "HEX (Web)"
    - "Pantone (Special printing)"
    - "HKS (German printing standard)"
    - "RAL (Industrial coatings)"