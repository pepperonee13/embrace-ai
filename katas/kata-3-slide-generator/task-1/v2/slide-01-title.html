<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Benchmark April 2025 - Executive Summary</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
            height: auto;
        }
        .slide-container {
            max-width: 1000px;
            width: 100%;
        }
        .main-title {
            font-size: 3.5rem;
            font-weight: 700;
            color: #024b80;
            margin-bottom: 20px;
            line-height: 1.1;
        }
        .subtitle {
            font-size: 1.8rem;
            color: #303944;
            margin-bottom: 30px;
            font-weight: 400;
        }
        .date-badge {
            background: linear-gradient(135deg, #09909c 0%, #036b75 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 40px;
        }
        .executive-summary {
            background: rgba(32, 94, 167, 0.05);
            padding: 20px 30px;
            border-radius: 8px;
            border-left: 4px solid #f08226;
            font-size: 1.1rem;
            color: #303944;
            max-width: 700px;
            margin: 0 auto;
            text-align: left;
        }
        .accent-line {
            height: 3px;
            background: linear-gradient(90deg, #205ea7 0%, #09909c 50%, #f08226 100%);
            width: 200px;
            margin: 30px auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <img src="../../TIMETOACT-AT_logo.svg" alt="TIMETOACT Logo" class="logo">
    <div class="slide-container">
        <div class="date-badge">April 2025</div>
        <h1 class="main-title">LLM Benchmark Report</h1>
        <p class="subtitle">Executive Summary for Leadership</p>
        <div class="accent-line"></div>
        <div class="executive-summary">
            <strong>Key Focus Areas:</strong> New model releases from OpenAI, breakthrough advances in local Qwen3 models, Google's competitive positioning, and practical insights from our Embrace AI Initiative.
        </div>
    </div>
</body>
</html>
